<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin — DISCORDIA</title>
  <link rel="icon" type="image/png" href="./assets/logo-discordia.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');

    body {
      font-family: 'Poppins', sans-serif;
    }

    h2,
    h3,
    h4 {
      font-family: 'Playfair Display', serif;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-[#faf8f7] to-[#f5ede8] text-gray-900 min-h-screen">

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- HEADER                                                -->
  <!-- ══════════════════════════════════════════════════════ -->
  <header class="sticky top-0 left-0 w-full bg-white/96 backdrop-blur-md z-50 shadow-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">

      <!-- Logo + title -->
      <div class="flex items-center gap-3">
        <img src="./assets/logo-discordia.png" alt="DISCORDIA"
          class="h-9 w-9 rounded-full object-contain bg-white border border-gray-100">
        <div>
          <p class="font-bold text-lg text-[#6d165a]" style="font-family:'Playfair Display',serif;">DISCORDIA Admin</p>
          <p class="text-xs text-gray-400 -mt-0.5">Panel interno de operación</p>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3">
        <a href="./index.html"
          class="hidden sm:flex items-center gap-2 px-4 py-2 rounded-xl bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-semibold transition">
          <i class="fa-solid fa-arrow-left text-xs"></i> Tienda
        </a>
        <button id="logout-btn"
          class="flex items-center gap-2 px-4 py-2 rounded-xl bg-gradient-to-r from-[#ecd9ff] to-[#ffd5e3] text-white text-sm font-semibold hover:opacity-90 transition">
          <i class="fa-solid fa-right-from-bracket text-xs"></i>
          <span class="hidden sm:inline">Cerrar sesión</span>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8 md:py-10 space-y-6">

    <!-- KPI Summary Cards (populated by admin.js) -->
    <section id="admin-summary" class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4"></section>

    <!-- Tab Navigation -->
    <section class="bg-white border border-gray-100 rounded-2xl p-3 shadow-sm">
      <div id="admin-tabs-nav" class="flex gap-2 overflow-x-auto no-scrollbar">
        <!-- Populated by admin.js buildTabs() -->
      </div>
    </section>

    <!-- Main Panel Content -->
    <section id="admin-panel" class="space-y-6">
      <!-- Populated by admin.js switchTab() -->
    </section>

  </main>

  <script type="module" src="./admin.js"></script>
</body>

</html>
