<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — DISCORDIA</title>
  <link rel="icon" type="image/png" href="./assets/logo-discordia.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>

<body
  class="min-h-screen bg-gradient-to-br from-[#6d165a] via-[#a0346e] to-[#ecd9ff] flex items-center justify-center p-4">

  <!-- Orbs de fondo -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden" aria-hidden="true">
    <div class="absolute -top-20 -left-20 w-96 h-96 bg-white/8 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-20 -right-20 w-96 h-96 bg-[#fcf5ee]/10 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-sm">

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

      <!-- Header -->
      <div class="bg-gradient-to-r from-[#6d165a] to-[#a0346e] px-8 py-8 text-center">
        <img src="./assets/logo-discordia.png" alt="DISCORDIA"
          class="w-16 h-16 object-contain mx-auto mb-3 rounded-full bg-white/20 p-2">
        <h1 class="text-white font-bold text-2xl" style="font-family:'Playfair Display',serif;">Panel Admin</h1>
        <p class="text-white/70 text-sm mt-1">Acceso restringido · DISCORDIA</p>
      </div>

      <!-- Form -->
      <div class="px-8 py-8">

        <!-- Error message -->
        <div id="error-msg"
          class="hidden bg-rose-50 border border-rose-200 text-rose-700 text-sm rounded-xl px-4 py-3 mb-5 flex items-center gap-2">
          <span class="text-base">⚠️</span>
          <span id="error-text">Credenciales inválidas</span>
        </div>

        <div class="space-y-4">
          <div>
            <label class="text-xs uppercase tracking-[0.15em] text-[#6d165a] font-semibold block mb-1.5">Usuario</label>
            <input id="username" type="text" autocomplete="username"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-[#ecd9ff] focus:ring-2 focus:ring-[#ecd9ff]/20 transition"
              placeholder="admin">
          </div>
          <div>
            <label
              class="text-xs uppercase tracking-[0.15em] text-[#6d165a] font-semibold block mb-1.5">Contraseña</label>
            <div class="relative">
              <input id="password" type="password" autocomplete="current-password"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-[#ecd9ff] focus:ring-2 focus:ring-[#ecd9ff]/20 transition pr-12"
                placeholder="••••••••">
              <button id="toggle-pwd" type="button"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#6d165a] transition text-sm">
                👁
              </button>
            </div>
          </div>
        </div>

        <button id="login-btn"
          class="mt-6 w-full bg-gradient-to-r from-[#ecd9ff] to-[#ffd5e3] hover:from-[#ffd5e3] hover:to-[#fcf5ee] text-white font-bold py-3.5 rounded-xl transition hover:shadow-lg flex items-center justify-center gap-2 text-sm">
          <span id="btn-text">Ingresar al panel</span>
          <span id="btn-spinner" class="hidden">
            <svg class="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity="0.25" />
              <path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
            </svg>
          </span>
        </button>

        <p class="text-center mt-5 text-xs text-gray-400">
          <a href="./index.html" class="hover:text-[#6d165a] transition">← Volver a la tienda</a>
        </p>
      </div>
    </div>

    <p class="text-center mt-4 text-white/40 text-xs">DISCORDIA · Panel interno</p>
  </div>

  <script type="module">
    // Redirigir si ya hay sesión
    if (localStorage.getItem('discordia_admin_token')) {
      window.location.href = './admin.html';
    }

    const loginBtn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');
    const errorText = document.getElementById('error-text');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');
    const togglePwd = document.getElementById('toggle-pwd');
    const pwdInput = document.getElementById('password');

    // Toggle password visibility
    togglePwd.addEventListener('click', () => {
      const isText = pwdInput.type === 'text';
      pwdInput.type = isText ? 'password' : 'text';
      togglePwd.textContent = isText ? '👁' : '🙈';
    });

    // Login on Enter
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') loginBtn.click();
    });

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.remove('hidden');
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      btnText.textContent = loading ? 'Verificando...' : 'Ingresar al panel';
      btnSpinner.classList.toggle('hidden', !loading);
    }

    loginBtn.addEventListener('click', async () => {
      errorMsg.classList.add('hidden');
      const username = document.getElementById('username').value.trim();
      const password = pwdInput.value.trim();

      if (!username || !password) {
        showError('Completa usuario y contraseña.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/api/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.ok) {
          localStorage.setItem('discordia_admin_token', data.token);
          localStorage.setItem('discordia_admin_user', data.username);
          window.location.href = './admin.html';
        } else {
          showError(data.message || 'Credenciales inválidas.');
        }
      } catch {
        showError('Error de conexión. Intenta de nuevo.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>

</html>
