<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — DISCORDIA</title>
  <link rel="icon" type="image/png" href="./assets/logo-discordia.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
    
    * {
      font-family: 'Poppins', sans-serif;
    }

    body {
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    .parallax-bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #6d165a 0%, #a0346e 45%, #ec5c8d 100%);
      z-index: 0;
    }

    .parallax-layer {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform;
      transition: transform 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .login-card {
      position: relative;
      z-index: 10;
      will-change: transform;
      transition: transform 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
      position: relative;
      z-index: 5;
    }
  </style>
</head>
<body>

  <!-- Fondo parallax gradiente -->
  <div class="parallax-bg"></div>

  <!-- Capas decorativas flotantes (parallax) -->
  <div class="parallax-layer" id="orb1"
    style="width:420px;height:420px;top:-100px;left:-120px;
           background:radial-gradient(circle,rgba(255,196,166,0.25) 0%,transparent 70%);">
  </div>
  <div class="parallax-layer" id="orb2"
    style="width:320px;height:320px;bottom:-80px;right:-80px;
           background:radial-gradient(circle,rgba(255,140,145,0.2) 0%,transparent 70%);">
  </div>
  <div class="parallax-layer" id="orb3"
    style="width:180px;height:180px;top:30%;right:15%;
           background:radial-gradient(circle,rgba(255,255,255,0.1) 0%,transparent 70%);">
  </div>
  <div class="parallax-layer" id="orb4"
    style="width:100px;height:100px;bottom:20%;left:10%;
           background:radial-gradient(circle,rgba(255,196,166,0.18) 0%,transparent 70%);">
  </div>

  <!-- Partículas decorativas -->
  <div class="parallax-layer" id="dot1"
    style="width:12px;height:12px;top:20%;left:25%;
           background:rgba(255,196,166,0.5);border-radius:50%;">
  </div>
  <div class="parallax-layer" id="dot2"
    style="width:8px;height:8px;top:70%;right:30%;
           background:rgba(255,255,255,0.4);border-radius:50%;">
  </div>
  <div class="parallax-layer" id="dot3"
    style="width:6px;height:6px;top:40%;left:60%;
           background:rgba(255,196,166,0.6);border-radius:50%;">
  </div>

  <!-- Contenedor principal -->
  <div class="login-container">
    <div class="w-full max-w-sm">

      <!-- Card -->
      <div class="login-card bg-white rounded-3xl shadow-2xl overflow-hidden">

        <!-- Header con gradiente -->
        <div class="bg-gradient-to-r from-[#6d165a] to-[#a0346e] px-8 py-8 text-center">
          <img src="./assets/logo-discordia.png" alt="DISCORDIA" class="w-16 h-16 object-contain mx-auto mb-3 rounded-full bg-white/20 p-2">
          <h1 class="text-white font-bold text-2xl" style="font-family:'Playfair Display',serif;">Panel Admin</h1>
          <p class="text-white/70 text-sm mt-1">Acceso restringido · DISCORDIA</p>
        </div>

        <!-- Form -->
        <div class="px-8 py-8">

          <!-- Error message -->
          <div id="error-msg" class="hidden bg-rose-50 border border-rose-200 text-rose-700 text-sm rounded-xl px-4 py-3 mb-5 flex items-center gap-2">
            <span class="text-base">⚠️</span>
            <span id="error-text">Credenciales inválidas</span>
          </div>

          <div class="space-y-4">
            <div>
              <label class="text-xs uppercase tracking-[0.15em] text-[#6d165a] font-semibold block mb-1.5">Usuario</label>
              <input id="username" type="text" autocomplete="username"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-[#ec5c8d] focus:ring-2 focus:ring-[#ec5c8d]/20 transition"
                placeholder="admin">
            </div>
            <div>
              <label class="text-xs uppercase tracking-[0.15em] text-[#6d165a] font-semibold block mb-1.5">Contraseña</label>
              <div class="relative">
                <input id="password" type="password" autocomplete="current-password"
                  class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-[#ec5c8d] focus:ring-2 focus:ring-[#ec5c8d]/20 transition pr-12"
                  placeholder="••••••••">
                <button id="toggle-pwd" type="button"
                  class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#6d165a] transition text-sm">
                  👁
                </button>
              </div>
            </div>
          </div>

          <button id="login-btn"
            class="mt-6 w-full bg-gradient-to-r from-[#ec5c8d] to-[#ff8c91] hover:from-[#ff8c91] hover:to-[#ffc4a6] text-white font-bold py-3.5 rounded-xl transition hover:shadow-lg flex items-center justify-center gap-2 text-sm">
            <span id="btn-text">Ingresar al panel</span>
            <span id="btn-spinner" class="hidden">
              <svg class="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity="0.25"/>
                <path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
              </svg>
            </span>
          </button>

          <p class="text-center mt-5 text-xs text-gray-400">
            <a href="./index.html" class="hover:text-[#6d165a] transition">← Volver a la tienda</a>
          </p>
        </div>
      </div>

      <p class="text-center mt-4 text-white/40 text-xs">DISCORDIA · Panel interno</p>
    </div>
  </div>

  <script type="module">
    // Redirigir si ya hay sesión
    if (localStorage.getItem('discordia_admin_token')) {
      window.location.href = './admin.html';
    }

    const loginBtn  = document.getElementById('login-btn');
    const errorMsg  = document.getElementById('error-msg');
    const errorText = document.getElementById('error-text');
    const btnText   = document.getElementById('btn-text');
    const btnSpinner= document.getElementById('btn-spinner');
    const togglePwd = document.getElementById('toggle-pwd');
    const pwdInput  = document.getElementById('password');

    // Toggle password visibility
    togglePwd.addEventListener('click', () => {
      const isText = pwdInput.type === 'text';
      pwdInput.type = isText ? 'password' : 'text';
      togglePwd.textContent = isText ? '👁' : '🙈';
    });

    // Login on Enter
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') loginBtn.click();
    });

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.remove('hidden');
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      btnText.textContent   = loading ? 'Verificando...' : 'Ingresar al panel';
      btnSpinner.classList.toggle('hidden', !loading);
    }

    function getApiUrl(endpoint) {
      const host = window.location.hostname;
      const isLocal = host === 'localhost' || host === '127.0.0.1' || host.startsWith('192.168.') || host.endsWith('.local');
      
      if (isLocal) {
        return `http://localhost:5000${endpoint}`;
      }
      return endpoint;
    }

    loginBtn.addEventListener('click', async () => {
      errorMsg.classList.add('hidden');
      const username = document.getElementById('username').value.trim();
      const password = pwdInput.value.trim();

      if (!username || !password) {
        showError('Completa usuario y contraseña.');
        return;
      }

      setLoading(true);

      try {
        const apiUrl = getApiUrl('/api/discordia/admin-login');
        const res  = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.ok) {
          localStorage.setItem('discordia_admin_token', data.token);
          localStorage.setItem('discordia_admin_user', data.username);
          window.location.href = './admin.html';
        } else {
          showError(data.message || 'Credenciales inválidas.');
        }
      } catch {
        showError('Error de conexión. Verifica que el servidor esté activo.');
      } finally {
        setLoading(false);
      }
    });
  </script>

  <!-- Parallax mouse-move effect -->
  <script>
    const layers = [
      { el: document.getElementById('orb1'),  depth: 0.015 },
      { el: document.getElementById('orb2'),  depth: 0.025 },
      { el: document.getElementById('orb3'),  depth: 0.04  },
      { el: document.getElementById('orb4'),  depth: 0.035 },
      { el: document.getElementById('dot1'),  depth: 0.06  },
      { el: document.getElementById('dot2'),  depth: 0.08  },
      { el: document.getElementById('dot3'),  depth: 0.07  },
    ];

    const card = document.querySelector('.login-card');
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;

    document.addEventListener('mousemove', (e) => {
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;

      layers.forEach(({ el, depth }) => {
        const x = dx * depth;
        const y = dy * depth;
        el.style.transform = `translate(${x}px, ${y}px)`;
      });

      // Leve inclinación 3D en la tarjeta
      const rx =  (dy / cy) * 4;
      const ry = -(dx / cx) * 4;
      card.style.transform = `perspective(900px) rotateX(${rx}deg) rotateY(${ry}deg)`;
    });

    document.addEventListener('mouseleave', () => {
      layers.forEach(({ el }) => el.style.transform = 'translate(0,0)');
      card.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg)';
    });
  </script>

</body>
</html>
