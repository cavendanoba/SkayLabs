<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopCash - Organizador de Nómina Personal</title>
    
    <!-- Tailwind CSS desde CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: {
                    colors: {
                        'neutral': {
                            '50': '#f9fafb',
                            '100': '#f3f4f6',
                            '200': '#e5e7eb',
                            '300': '#d1d5db',
                            '400': '#9ca3af',
                            '500': '#6b7280',
                            '600': '#4b5563',
                            '700': '#374151',
                            '800': '#1f2937',
                            '900': '#111827',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Detectar modo oscuro -->
    <script>
        if (localStorage.getItem('darkMode') === 'true' || 
            (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
    </script>
    
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="/copcash/css/styles.css">
</head>
<body class="bg-neutral-50 dark:bg-neutral-900 text-neutral-900 dark:text-neutral-100 transition-colors duration-300">
    <!-- Navbar -->
    <nav class="sticky top-0 z-40 border-b border-neutral-200 dark:border-neutral-800 backdrop-blur-lg bg-white/95 dark:bg-neutral-900/95">
        <div id="navbar-container"></div>
    </nav>

    <!-- Contenedor principal -->
    <main class="min-h-[calc(100vh-200px)]">
        <div class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
            <div id="app-container"></div>
        </div>
    </main>

    <!-- Footer minimalista -->
    <footer class="border-t border-neutral-200 dark:border-neutral-800 bg-neutral-50 dark:bg-neutral-900/50 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="text-center">
                <p class="text-sm text-neutral-600 dark:text-neutral-400">
                    💰 <strong>CopCash</strong> v1.0.0 | Organizador de Nómina Personal
                </p>
                <p class="text-xs text-neutral-500 dark:text-neutral-500 mt-2">
                    Todos los datos se guardan localmente en tu navegador
                </p>
            </div>
        </div>
    </footer>

    <!-- Punto de entrada de la aplicación -->
    <script type="module" src="/copcash/js/app.js"></script>

    <script>
        // Manejo de errores global
        window.addEventListener('error', (event) => {
            console.error('Error global:', event.error);
        });
    </script>
</body>
</html>
